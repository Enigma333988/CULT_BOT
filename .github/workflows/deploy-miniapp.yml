name: Deploy Mini App

on:
  push:
    branches:
      - main
    paths:
      - "miniapp/**"
      - ".github/workflows/deploy-miniapp.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy miniapp to SprintHost via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          source: "miniapp/*,miniapp/.htaccess"
          target: ${{ secrets.FTP_SERVER_DIR }}
          strip_components: 1
