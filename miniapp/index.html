<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>__CULT_MINI_APP_TITLE__</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .stage {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      min-height: 100vh;
      background: #ffffff;
    }

    .mockup {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      background: #ffffff;
    }

    .fallback {
      max-width: 360px;
      padding: 24px;
      color: #6b6b6b;
      text-align: center;
      line-height: 1.5;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="stage">
    <img id="mockup" class="mockup hidden" alt="Mini App mockup preview">
    <div id="fallback" class="fallback hidden">
      Положи макет в <code>miniapp/mockups/</code> с именем <code>current.png</code>,
      <code>current.jpg</code>, <code>current.jpeg</code> или <code>current.webp</code>.
      Можно также открыть конкретный файл через параметр <code>?mockup=name.png</code>.
    </div>
  </main>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    const maxApp = window.WebApp || null;
    const vkBridge = window.vkBridge || null;
    const mockupImage = document.getElementById("mockup");
    const fallback = document.getElementById("fallback");

    if (tg) {
      try {
        tg.ready();
        tg.expand();
      } catch (error) {
        console.error("Telegram bridge init failed", error);
      }
    }

    if (maxApp && typeof maxApp.ready === "function") {
      try {
        maxApp.ready();
      } catch (error) {
        console.error("MAX bridge init failed", error);
      }
    }

    if (vkBridge && typeof vkBridge.send === "function") {
      vkBridge.send("VKWebAppInit").catch((error) => {
        console.error("VK bridge init failed", error);
      });
    }

    startMockupPreview();

    async function startMockupPreview() {
      const candidates = buildMockupCandidates();
      for (const src of candidates) {
        const ok = await tryLoadImage(src);
        if (ok) {
          mockupImage.src = src;
          mockupImage.classList.remove("hidden");
          fallback.classList.add("hidden");
          return;
        }
      }

      fallback.classList.remove("hidden");
    }

    function buildMockupCandidates() {
      const params = new URLSearchParams(window.location.search);
      const explicit = sanitizeMockupName(params.get("mockup"));
      const candidates = [];

      if (explicit) {
        candidates.push(`./mockups/${explicit}`);
      }

      candidates.push("./mockups/current.png");
      candidates.push("./mockups/current.jpg");
      candidates.push("./mockups/current.jpeg");
      candidates.push("./mockups/current.webp");
      return candidates;
    }

    function sanitizeMockupName(value) {
      if (!value) {
        return "";
      }
      const trimmed = value.trim();
      if (!trimmed) {
        return "";
      }
      if (trimmed.includes("/") || trimmed.includes("\\") || trimmed.includes("..")) {
        return "";
      }
      return trimmed;
    }

    function tryLoadImage(src) {
      return new Promise((resolve) => {
        const image = new Image();
        image.onload = () => resolve(true);
        image.onerror = () => resolve(false);
        image.src = src;
      });
    }
  </script>
</body>
</html>
